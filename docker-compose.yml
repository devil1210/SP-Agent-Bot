services:
  sp-agent:
    image: ghcr.io/devil1210/sp-agent-bot:latest
    container_name: sp-agent
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - PROJECTS_ROOT_PATH=${PROJECTS_ROOT_PATH}
      - CODING_AGENT_API_KEY=${CODING_AGENT_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - POSTGREST_URL=${POSTGREST_URL}
      - POSTGREST_ANON_KEY=${POSTGREST_ANON_KEY}
      - ZEEPUB_API_URL=${ZEEPUB_API_URL}
      - ZEEPUB_API_KEY=${ZEEPUB_API_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sp-agent-admin:
    image: ghcr.io/devil1210/sp-agent-bot:latest
    container_name: sp-agent-admin
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN2}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - PROJECTS_ROOT_PATH=${PROJECTS_ROOT_PATH}
      - CODING_AGENT_API_KEY=${CODING_AGENT_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - POSTGREST_URL=${POSTGREST_URL}
      - POSTGREST_ANON_KEY=${POSTGREST_ANON_KEY}
      - ZEEPUB_API_URL=${ZEEPUB_API_URL}
      - ZEEPUB_API_KEY=${ZEEPUB_API_KEY}
      - ENABLE_PROXMOX_CONTROL=true
      - PROXMOX_HOST=192.168.1.254
      - WEBHOOK_URL=${WEBHOOK_URL}
      - PORT=${PORT}
      - TEMP_DIR=/music/downloads
      - MUSIC_DIR=/music
    ports:
      - "3000:8080"
    volumes:
      - /root/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /media/music:/music
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

