services:
  sp-agent:
    # Esta es la imagen que GitHub Actions construye automáticamente
    image: ghcr.io/devil1210/sp-agent-bot:latest
    container_name: sp-agent
    restart: always
    # Limita el tamaño de los logs para no llenar el disco de tu Proxmox
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
